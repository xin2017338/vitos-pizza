<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="Vito's Pizzeria">
  <defs>
    <linearGradient id="crust" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f4a442"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="neon" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ff6b6b"/>
      <stop offset="50%" stop-color="#ff4757"/>
      <stop offset="100%" stop-color="#c0392b"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <path d="M100 24 L168 156 Q100 176 32 156 Z" fill="url(#crust)" stroke="#b45309" stroke-width="3"/>
  <path d="M100 24 L100 156" stroke="#b45309" stroke-width="2" opacity="0.5"/>
  <circle cx="118" cy="98" r="9" fill="#dc2626"/>
  <circle cx="88" cy="118" r="8" fill="#dc2626"/>
  <circle cx="108" cy="132" r="7" fill="#dc2626"/>
  <circle cx="72" cy="108" r="6" fill="#dc2626"/>
  <rect x="18" y="162" width="164" height="28" rx="6" fill="#1a1a2e" stroke="#334155" stroke-width="2"/>
  <text x="100" y="182" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="18" font-weight="bold" fill="url(#neon)" filter="url(#glow)">VITO</text>
</svg>
