name: Publish to npm

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write # Required for npm Trusted Publishing (OIDC)

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
          scope: "@vitos-pizza"

      - name: Install dependencies
        run: npm ci

      # Trusted Publishing requires npm >= 11.5.1
      - name: Upgrade npm for OIDC publish
        run: npm install -g npm@latest

      - name: Check version not already published
        id: check
        run: |
          set -euo pipefail
          NAME="$(node -p "require('./package.json').name")"
          VERSION="$(node -p "require('./package.json').version")"
          echo "name=$NAME" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if npm view "${NAME}@${VERSION}" version >/dev/null 2>&1; then
            echo "already=true" >> "$GITHUB_OUTPUT"
            echo "Package ${NAME}@${VERSION} already exists on npm — skipping publish."
          else
            echo "already=false" >> "$GITHUB_OUTPUT"
            echo "Will publish ${NAME}@${VERSION}"
          fi

      # No NODE_AUTH_TOKEN / NPM_TOKEN — OIDC Trusted Publishing only
      - name: Publish
        if: steps.check.outputs.already == 'false'
        run: npm publish --access public

      - name: Summary
        run: |
          echo "### npm publish (Trusted Publishing / OIDC)" >> "$GITHUB_STEP_SUMMARY"
          echo "- Package: \`${{ steps.check.outputs.name }}@${{ steps.check.outputs.version }}\`" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ steps.check.outputs.already }}" = "true" ]; then
            echo "- Result: skipped (already published)" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "- Result: published" >> "$GITHUB_STEP_SUMMARY"
            echo "- Install: \`pi install npm:@vitos-pizza/vitos-pizza@${{ steps.check.outputs.version }}\`" >> "$GITHUB_STEP_SUMMARY"
          fi
